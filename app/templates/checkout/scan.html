{% extends "base.html" %}

{% block title %}{{ t('checkout_title') }}{% endblock %}

{% block body %}
<div class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            {{ t('checkout_title') }}
        </h1>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <p class="text-gray-500 text-center mb-6">{{ t('checkout_dni_instruction') }}</p>

        <!-- Formulari DNI -->
        <form method="POST" action="/checkout/dni">
            <div class="mb-4">
                <input type="text" name="id_document" autocomplete="off" autofocus
                       placeholder="{{ t('checkout_dni_placeholder') }}"
                       class="touch-input w-full border border-gray-300 rounded-lg px-4 py-3 text-center text-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="touch-btn w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition">
                {{ t('checkout_btn') }}
            </button>
        </form>
    </div>

    <!-- Tornar -->
    {% if lang is defined %}
    <div class="mt-6">
        <a href="/{{ lang }}/action" class="text-gray-400 hover:text-gray-600 text-sm">
            {{ t('btn_back') }}
        </a>
    </div>
    {% endif %}
</div>
{% endblock %}
