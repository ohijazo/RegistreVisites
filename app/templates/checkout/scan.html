{% extends "base.html" %}

{% block title %}{{ t('checkout_title') }}{% endblock %}

{% block body %}
<div class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">
            {{ t('checkout_title') }}
        </h1>

        <p class="text-gray-500 text-center mb-6">{{ t('checkout_dni_instruction') }}</p>

        {% if error %}
        <div class="bg-red-100 border-2 border-red-500 text-red-700 px-4 py-3 rounded-lg mb-4 text-center font-semibold" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <!-- Formulari DNI -->
        <form method="POST" action="/checkout/dni">
            <div class="mb-6">
                <div class="relative">
                    <input type="text" name="id_document" autocomplete="off" autofocus
                           placeholder="{{ t('checkout_dni_placeholder') }}"
                           class="touch-input w-full border-2 border-gray-300 rounded-lg px-4 py-4 text-center text-2xl font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <button type="submit"
                    class="touch-btn w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold text-lg transition shadow-md">
                {{ t('checkout_btn') }}
            </button>
        </form>
    </div>

    <!-- Tornar -->
    {% if lang is defined %}
    <div class="mt-6">
        <a href="/{{ lang }}/action"
           class="inline-block bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-lg font-medium px-6 py-3 transition">
            {{ t('btn_back') }}
        </a>
    </div>
    {% endif %}
</div>
{% endblock %}
