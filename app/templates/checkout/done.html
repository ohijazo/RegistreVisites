{% extends "base.html" %}

{% block title %}{{ t('checkout_done_title') }}{% endblock %}

{% block body %}
<div class="flex flex-col items-center justify-center min-h-screen px-4 text-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <div class="text-green-500 text-6xl mb-4">&#10003;</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            {{ t('checkout_done_title') }}
        </h1>
        <p class="text-lg text-gray-600 mb-6">
            {{ t('checkout_done_msg') }}
        </p>
    </div>
</div>

<script>
    // Tornar a la pantalla d'inici després de 10 segons
    setTimeout(function() {
        window.location.href = '/{{ lang|default("ca") }}/';
    }, 5000);
</script>
{% endblock %}
