{% extends "base.html" %}

{% block title %}{{ t('welcome_title') }}{% endblock %}

{% block body %}
<div class="flex flex-col items-center justify-center min-h-screen px-4">
    <!-- Logo -->
    <div class="mb-8">
        <img src="/static/logo.png" alt="{{ settings.COMPANY_NAME }}" class="h-16 mx-auto"
             onerror="this.style.display='none'">
    </div>

    <h1 class="text-3xl font-bold text-gray-800 mb-10 text-center">
        {{ t('welcome_title') }}
    </h1>

    <div class="flex flex-col gap-5 w-full max-w-md">
        <!-- Checkin -->
        <a href="/{{ lang }}/register"
           class="flex items-center gap-5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-8 px-6 transition shadow-md">
            <svg class="w-12 h-12 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            <div class="text-left">
                <div class="text-2xl font-bold">{{ t('action_checkin') }}</div>
                <div class="text-sm font-normal opacity-80 mt-1">{{ t('action_checkin_desc') }}</div>
            </div>
        </a>

        <!-- Checkout -->
        <a href="/{{ lang }}/checkout"
           class="flex items-center gap-5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl py-8 px-6 transition shadow-md">
            <svg class="w-12 h-12 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <div class="text-left">
                <div class="text-2xl font-bold">{{ t('action_checkout') }}</div>
                <div class="text-sm font-normal opacity-80 mt-1">{{ t('action_checkout_desc') }}</div>
            </div>
        </a>

        <!-- Grup (ocultat per ara)
        <a href="/{{ lang }}/group"
           class="flex items-center gap-5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl py-8 px-6 transition shadow-md">
            <svg class="w-12 h-12 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <div class="text-left">
                <div class="text-2xl font-bold">{{ t('action_group') }}</div>
                <div class="text-sm font-normal opacity-80 mt-1">{{ t('action_group_desc') }}</div>
            </div>
        </a>
        -->
    </div>

    <!-- Tornar a selecció idioma -->
    <div class="mt-10">
        <a href="/{{ lang }}/"
           class="inline-block bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-lg font-medium px-6 py-3 transition">
            {{ t('btn_back') }}
        </a>
    </div>
</div>
{% endblock %}
