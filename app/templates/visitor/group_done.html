{% extends "base.html" %}

{% block title %}{{ t('group_done_title') }}{% endblock %}

{% block body %}
<div class="flex flex-col items-center justify-center min-h-screen px-4 text-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <div class="text-green-500 text-5xl mb-4">&#10003;</div>

        <h1 class="text-2xl font-bold text-gray-800 mb-2">
            {{ t('group_done_title') }}
        </h1>

        <p class="text-xl text-gray-600 mb-4">
            {{ t('group_done_count', count=count) }}
        </p>

        <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-6">
            <p class="text-sm text-blue-700">{{ t('confirmation_exit_dni') }}</p>
        </div>

        <p class="text-sm text-gray-600 font-semibold" id="countdown">
            {{ t('confirmation_reset_msg', secs=kiosk_reset_seconds) }}
        </p>
    </div>
</div>

<script>
    history.replaceState(null, '', window.location.href);
    var secs = {{ kiosk_reset_seconds }};
    var countdown = document.getElementById('countdown');
    setInterval(function() {
        secs--;
        if (secs <= 0) { window.location.href = '/{{ lang }}/'; }
        else { countdown.textContent = '{{ t("confirmation_reset_msg", secs="__SECS__") }}'.replace('__SECS__', secs); }
    }, 1000);
</script>
{% endblock %}
