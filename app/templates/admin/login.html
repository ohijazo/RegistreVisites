<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Registre de Visites</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Registre de Visites</h1>
        <p class="text-gray-500 text-center text-sm mb-8">Panell d'administració</p>

        {% if error %}
        <div class="bg-red-100 border-2 border-red-500 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm font-semibold" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin/login">
            {% include "_csrf.html" %}
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-800 mb-2">Email</label>
                <input type="email" name="email" required autofocus
                       class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-7">
                <label class="block text-sm font-semibold text-gray-800 mb-2">Contrasenya</label>
                <input type="password" name="password" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold text-base transition shadow-md">
                Iniciar sessió
            </button>
        </form>
    </div>
</body>
</html>
